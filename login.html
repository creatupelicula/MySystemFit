<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MySystemFit — Iniciar sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/tokens.css" />
<link rel="stylesheet" href="assets/css/app.css" />
<script src="assets/js/theme.js"></script>
<style>
  .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; perspective: 1200px; }
  .auth-card {
    width: 100%; max-width: 410px;
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg), 0 0 80px -30px var(--indigo-glow);
    animation: authFloat 7s ease-in-out infinite;
  }
  @keyframes authFloat {
    0%, 100% { transform: translateY(0) rotateX(0deg); }
    50% { transform: translateY(-8px) rotateX(0.8deg); }
  }
  @media (prefers-reduced-motion: reduce) { .auth-card { animation: none; } }
  .auth-logo {
    position: relative;
  }
  .auth-logo::before {
    content: ""; position: absolute; inset: -10px; border-radius: 50%;
    background: radial-gradient(circle, var(--indigo-glow), transparent 70%);
    animation: logoPulse 3s ease-in-out infinite; z-index: -1;
  }
  @keyframes logoPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.25); }
  }
  .auth-title { text-align: center; font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
  .auth-sub { text-align: center; font-size: 13px; color: var(--text-2); margin-bottom: 20px; }
  .auth-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .auth-tabs button { flex: 1; }
  .auth-role { display: flex; gap: 8px; margin-bottom: 16px; }
  .auth-role button { flex: 1; }
  .auth-error { color: var(--coral); font-size: 13px; margin-top: 8px; display: none; }
  .auth-switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-3); }
  .auth-switch a { color: var(--indigo-hi); cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<div class="aurora-deep"></div>
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="brand auth-logo" style="margin-bottom:16px;justify-content:center">
      <div class="brand__logo"><svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5M4 12l4-4M16 16l4-4M8 4l12 12M4 8l12 12"/></svg></div>
      <div class="brand__name">MySystem<span class="text-gradient">Fit</span></div>
    </div>
    <div class="auth-title">Tu sistema. Tu progreso.</div>
    <div class="auth-sub">Entrena, gestiona y crece con MySystemFit</div>

    <div class="auth-tabs">
      <button class="btn btn--primary" id="tabLogin" type="button">Iniciar sesión</button>
      <button class="btn btn--ghost" id="tabSignup" type="button">Crear cuenta</button>
    </div>

    <!-- ---------- LOGIN ---------- -->
    <form id="formLogin">
      <div class="field"><label for="loginEmail">Email</label><input class="input" type="email" id="loginEmail" required autocomplete="email"></div>
      <div class="field"><label for="loginPassword">Contraseña</label><input class="input" type="password" id="loginPassword" required autocomplete="current-password"></div>
      <button class="btn btn--primary btn--block" type="submit">Entrar</button>
      <div class="auth-error" id="loginError"></div>
      <div class="auth-switch"><a id="forgotLink">¿Olvidaste tu contraseña?</a></div>
    </form>

    <!-- ---------- RECUPERAR CONTRASEÑA ---------- -->
    <form id="formForgot" class="hidden">
      <p class="auth-sub" style="margin-bottom:12px">Te enviaremos un enlace para restablecer tu contraseña.</p>
      <div class="field"><label for="forgotEmail">Email</label><input class="input" type="email" id="forgotEmail" required autocomplete="email"></div>
      <button class="btn btn--primary btn--block" type="submit">Enviar enlace</button>
      <div class="auth-error" id="forgotError"></div>
      <div class="auth-switch"><a id="backToLogin">Volver a iniciar sesión</a></div>
    </form>

    <!-- ---------- NUEVA CONTRASEÑA (tras el enlace del correo) ---------- -->
    <form id="formReset" class="hidden">
      <p class="auth-sub" style="margin-bottom:12px">Escribe tu nueva contraseña.</p>
      <div class="field"><label for="resetPassword">Nueva contraseña</label><input class="input" type="password" id="resetPassword" required minlength="6" autocomplete="new-password"></div>
      <button class="btn btn--primary btn--block" type="submit">Guardar contraseña</button>
      <div class="auth-error" id="resetError"></div>
    </form>

    <!-- ---------- SIGNUP ---------- -->
    <form id="formSignup" class="hidden">
      <div class="auth-role">
        <button type="button" class="btn btn--primary is-active" data-role="coach" id="roleCoach">Soy coach</button>
        <button type="button" class="btn btn--ghost" data-role="alumno" id="roleAlumno">Soy alumno</button>
      </div>
      <div class="field"><label>Nombre completo</label><input class="input" id="suName" required></div>
      <div class="field"><label>Email</label><input class="input" type="email" id="suEmail" required autocomplete="email"></div>
      <div class="field"><label>Contraseña</label><input class="input" type="password" id="suPassword" required minlength="6" autocomplete="new-password"></div>
      <div class="field" id="suCoachIdField">
        <label>ID de tu coach</label>
        <input class="input" id="suCoachId" placeholder="Tu coach te lo comparte">
      </div>
      <div class="field" id="suRefCodeField">
        <label>Código de referido (opcional)</label>
        <input class="input" id="suRefCode" placeholder="Ej. MSF-AB12CD">
      </div>
      <button class="btn btn--primary btn--block" type="submit">Crear cuenta</button>
      <div class="auth-error" id="signupError"></div>
    </form>

    <div class="auth-switch">Revisa tu correo para confirmar la cuenta si tu proyecto Supabase lo requiere.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabaseClient.js"></script>
<script src="assets/js/auth.js"></script>
<script>
(function () {
  "use strict";
  const $ = (s) => document.querySelector(s);

  // Traducción de los errores más comunes de Supabase Auth.
  function authMsg(ex) {
    const m = ex?.message || "";
    if (/invalid login credentials/i.test(m)) return "Email o contraseña incorrectos.";
    if (/email not confirmed/i.test(m)) return "Confirma tu correo antes de iniciar sesión.";
    if (/rate limit/i.test(m)) return "Demasiados intentos. Espera unos minutos e inténtalo de nuevo.";
    if (/already registered|already been registered/i.test(m)) return "Ese correo ya tiene una cuenta.";
    if (/at least 6 characters/i.test(m)) return "La contraseña debe tener al menos 6 caracteres.";
    return m || "Algo salió mal. Inténtalo de nuevo.";
  }

  // Enlace de recuperación: cuando el usuario llega desde el correo,
  // supabase-js emite PASSWORD_RECOVERY → mostramos el formulario de nueva clave.
  let recovering = false;
  window.msfSupabase?.auth.onAuthStateChange((event) => {
    if (event === "PASSWORD_RECOVERY") {
      recovering = true;
      ["formLogin", "formSignup", "formForgot"].forEach((id) => $("#" + id).classList.add("hidden"));
      document.querySelector(".auth-tabs").classList.add("hidden");
      $("#formReset").classList.remove("hidden");
    }
  });

  // Si ya hay sesión activa (y no es un flujo de recuperación), saltar a la app.
  (async () => {
    if (!window.msfSupabase) return;
    await new Promise((r) => setTimeout(r, 400)); // deja que PASSWORD_RECOVERY dispare primero
    if (recovering) return;
    const result = await window.msfAuth.getSessionProfile();
    if (result) window.location.href = result.profile.role === "coach" ? "index.html" : "alumno.html";
  })();

  $("#forgotLink").addEventListener("click", () => {
    $("#formLogin").classList.add("hidden");
    $("#formForgot").classList.remove("hidden");
    $("#forgotEmail").value = $("#loginEmail").value;
  });
  $("#backToLogin").addEventListener("click", () => {
    $("#formForgot").classList.add("hidden");
    $("#formLogin").classList.remove("hidden");
  });
  $("#formForgot").addEventListener("submit", async (e) => {
    e.preventDefault();
    const err = $("#forgotError");
    err.style.display = "none";
    try {
      await window.msfAuth.requestPasswordReset($("#forgotEmail").value.trim());
      err.style.color = "var(--lime)";
      err.textContent = "Listo. Revisa tu correo y sigue el enlace.";
      err.style.display = "block";
    } catch (ex) {
      err.style.color = "var(--coral)";
      err.textContent = authMsg(ex);
      err.style.display = "block";
    }
  });
  $("#formReset").addEventListener("submit", async (e) => {
    e.preventDefault();
    const err = $("#resetError");
    err.style.display = "none";
    try {
      await window.msfAuth.updatePassword($("#resetPassword").value);
      const result = await window.msfAuth.getSessionProfile();
      window.location.href = result?.profile.role === "coach" ? "index.html" : "alumno.html";
    } catch (ex) {
      err.style.color = "var(--coral)";
      err.textContent = authMsg(ex);
      err.style.display = "block";
    }
  });

  $("#tabLogin").addEventListener("click", () => {
    $("#tabLogin").classList.replace("btn--ghost", "btn--primary");
    $("#tabSignup").classList.replace("btn--primary", "btn--ghost");
    $("#formLogin").classList.remove("hidden");
    $("#formSignup").classList.add("hidden");
  });
  $("#tabSignup").addEventListener("click", () => {
    $("#tabSignup").classList.replace("btn--ghost", "btn--primary");
    $("#tabLogin").classList.replace("btn--primary", "btn--ghost");
    $("#formSignup").classList.remove("hidden");
    $("#formLogin").classList.add("hidden");
  });

  let signupRole = "coach";
  function paintRole() {
    $("#roleCoach").classList.toggle("btn--primary", signupRole === "coach");
    $("#roleCoach").classList.toggle("btn--ghost", signupRole !== "coach");
    $("#roleAlumno").classList.toggle("btn--primary", signupRole === "alumno");
    $("#roleAlumno").classList.toggle("btn--ghost", signupRole !== "alumno");
    $("#suCoachIdField").style.display = signupRole === "alumno" ? "" : "none";
    $("#suRefCodeField").style.display = signupRole === "coach" ? "" : "none";
  }
  $("#roleCoach").addEventListener("click", () => { signupRole = "coach"; paintRole(); });
  $("#roleAlumno").addEventListener("click", () => { signupRole = "alumno"; paintRole(); });
  paintRole();

  $("#formLogin").addEventListener("submit", async (e) => {
    e.preventDefault();
    const err = $("#loginError");
    err.style.display = "none";
    try {
      await window.msfAuth.signIn($("#loginEmail").value.trim(), $("#loginPassword").value);
      const result = await window.msfAuth.getSessionProfile();
      window.location.href = result.profile.role === "coach" ? "index.html" : "alumno.html";
    } catch (ex) {
      err.textContent = authMsg(ex);
      err.style.display = "block";
    }
  });

  $("#formSignup").addEventListener("submit", async (e) => {
    e.preventDefault();
    const err = $("#signupError");
    err.style.display = "none";
    try {
      const name = $("#suName").value.trim();
      const email = $("#suEmail").value.trim();
      const pass = $("#suPassword").value;
      if (signupRole === "coach") {
        await window.msfAuth.signUpCoach(email, pass, name, $("#suRefCode").value.trim());
      } else {
        const coachId = $("#suCoachId").value.trim();
        if (!coachId) throw new Error("Necesitas el ID de tu coach para registrarte.");
        if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(coachId)) {
          throw new Error("Ese ID de coach no tiene el formato correcto. Pídeselo de nuevo a tu coach.");
        }
        const { data: ok, error: rpcErr } = await window.msfSupabase.rpc("coach_exists", { cid: coachId });
        if (rpcErr) throw rpcErr;
        if (!ok) throw new Error("No encontramos ningún coach con ese ID. Verifícalo con tu coach.");
        await window.msfAuth.signUpStudent(email, pass, name, coachId);
      }
      const result = await window.msfAuth.getSessionProfile();
      if (result) { window.location.href = result.profile.role === "coach" ? "index.html" : "alumno.html"; return; }
      err.style.display = "block";
      err.style.color = "var(--lime)";
      err.textContent = "Cuenta creada. Revisa tu correo para confirmar y luego inicia sesión.";
    } catch (ex) {
      err.style.color = "var(--coral)";
      err.textContent = authMsg(ex);
      err.style.display = "block";
    }
  });
})();
</script>
</body>
</html>
